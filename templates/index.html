<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SentimentScope — MongoDB Dashboard</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #080c10;
    --surface:  #0e1420;
    --border:   #1e2d40;
    --accent:   #00e5ff;
    --pos:      #00ff9d;
    --neg:      #ff3d6e;
    --neu:      #ffc847;
    --text:     #c8d8e8;
    --muted:    #4a6278;
    --glow:     0 0 20px rgba(0,229,255,0.15);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Space Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,229,255,0.07) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(30,45,64,0.4) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(30,45,64,0.2) 40px);
  }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 24px 40px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(14,20,32,0.8);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .db-badge {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.7rem; color: var(--muted); letter-spacing: 1px;
  }
  .db-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--pos); box-shadow: 0 0 8px var(--pos); animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  main { max-width: 1300px; margin: 0 auto; padding: 36px 24px; }

  /* ── STAT CARDS ── */
  .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 32px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .stat-card:hover { border-color: var(--accent); box-shadow: var(--glow); }
  .stat-card::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(0,229,255,0.04) 0%, transparent 60%);
  }
  .stat-label { font-size: 0.62rem; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 2.2rem; font-weight: 800; color: #fff; line-height: 1; }
  .stat-value.pos { color: var(--pos); text-shadow: 0 0 20px rgba(0,255,157,0.4); }
  .stat-value.neg { color: var(--neg); text-shadow: 0 0 20px rgba(255,61,110,0.4); }
  .stat-value.neu { color: var(--neu); text-shadow: 0 0 20px rgba(255,200,71,0.4); }
  .stat-value.acc { color: var(--accent); text-shadow: 0 0 20px rgba(0,229,255,0.4); }

  /* ── CHARTS GRID ── */
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 20px 16px;
  }
  .chart-title { font-size: 0.68rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
  .chart-card.full { grid-column: 1 / -1; }

  /* ── ANALYZER ── */
  .analyzer-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 28px;
  }
  .analyzer-title { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .analyzer-sub { font-size: 0.7rem; color: var(--muted); margin-bottom: 20px; }
  .input-row { display: flex; gap: 12px; }
  textarea {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'Space Mono', monospace;
    font-size: 0.8rem; padding: 12px 16px; resize: none; height: 80px;
    outline: none; transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }
  .side-controls { display: flex; flex-direction: column; gap: 8px; }
  select {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.75rem;
    padding: 8px 12px; outline: none; cursor: pointer;
  }
  button#analyzeBtn {
    background: var(--accent); color: #000; border: none; border-radius: 8px;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem;
    padding: 10px 20px; cursor: pointer; letter-spacing: 0.5px;
    transition: opacity 0.2s, transform 0.1s;
  }
  button#analyzeBtn:hover { opacity: 0.85; transform: translateY(-1px); }
  button#analyzeBtn:active { transform: translateY(0); }

  #result-box {
    margin-top: 16px; padding: 14px 18px;
    border-radius: 8px; border: 1px solid var(--border);
    font-size: 0.8rem; display: none; align-items: center; gap: 14px;
  }
  .result-sentiment { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; }
  .result-score { color: var(--muted); font-size: 0.75rem; }

  /* ── FEED ── */
  .feed-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
  .feed-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .feed-title { font-size: 0.68rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .feed-list { display: flex; flex-direction: column; gap: 10px; max-height: 340px; overflow-y: auto; padding-right: 4px; }
  .feed-list::-webkit-scrollbar { width: 4px; }
  .feed-list::-webkit-scrollbar-track { background: transparent; }
  .feed-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .feed-item {
    display: grid; grid-template-columns: auto 1fr auto auto;
    align-items: center; gap: 12px;
    padding: 10px 14px; border-radius: 8px;
    background: var(--bg); border: 1px solid var(--border);
    font-size: 0.75rem;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .feed-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-pos { background: var(--pos); box-shadow: 0 0 8px var(--pos); }
  .dot-neg { background: var(--neg); box-shadow: 0 0 8px var(--neg); }
  .dot-neu { background: var(--neu); box-shadow: 0 0 8px var(--neu); }
  .feed-text { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .feed-source { color: var(--muted); font-size: 0.65rem; white-space: nowrap; }
  .feed-score { font-size: 0.7rem; font-weight: 700; white-space: nowrap; }

  @media (max-width: 900px) {
    .stats-row { grid-template-columns: repeat(3, 1fr); }
    .charts-grid { grid-template-columns: 1fr; }
    .charts-grid .chart-card.full { grid-column: auto; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Sentiment<span>Scope</span></div>
  <div class="db-badge"><div class="db-dot"></div>MONGODB CONNECTED &nbsp;|&nbsp; sentiment_db.reviews</div>
</header>

<main>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Total Reviews</div><div class="stat-value acc" id="s-total">—</div></div>
    <div class="stat-card"><div class="stat-label">Avg Score</div><div class="stat-value acc" id="s-avg">—</div></div>
    <div class="stat-card"><div class="stat-label">Positive</div><div class="stat-value pos" id="s-pos">—</div></div>
    <div class="stat-card"><div class="stat-label">Negative</div><div class="stat-value neg" id="s-neg">—</div></div>
    <div class="stat-card"><div class="stat-label">Neutral</div><div class="stat-value neu" id="s-neu">—</div></div>
  </div>

  <!-- LIVE ANALYZER -->
  <div class="analyzer-card">
    <div class="analyzer-title">Live Analyzer</div>
    <div class="analyzer-sub">Type any text → analyze & store to MongoDB in real-time</div>
    <div class="input-row">
      <textarea id="review-input" placeholder="e.g. This product exceeded all my expectations..."></textarea>
      <div class="side-controls">
        <select id="source-select">
          <option>Amazon</option>
          <option>Twitter</option>
          <option>Reddit</option>
          <option>Manual</option>
        </select>
        <button id="analyzeBtn" onclick="analyzeText()">ANALYZE →</button>
      </div>
    </div>
    <div id="result-box">
      <div class="result-sentiment" id="result-sentiment"></div>
      <div>
        <div id="result-score" class="result-score"></div>
        <div id="result-label" style="font-size:0.7rem;margin-top:4px;color:var(--muted)">stored to mongodb ✓</div>
      </div>
    </div>
  </div>

  <!-- CHARTS -->
  <div class="charts-grid">
    <div class="chart-card"><div class="chart-title">Sentiment Distribution</div><div id="chart-donut" style="height:260px"></div></div>
    <div class="chart-card"><div class="chart-title">By Source & Sentiment</div><div id="chart-bar" style="height:260px"></div></div>
    <div class="chart-card full"><div class="chart-title">Score Over Time</div><div id="chart-line" style="height:220px"></div></div>
  </div>

  <!-- FEED -->
  <div class="feed-card">
    <div class="feed-header">
      <div class="feed-title">Recent Reviews Feed</div>
    </div>
    <div class="feed-list" id="feed"></div>
  </div>

</main>

<script>
const COLORS = { Positive: '#00ff9d', Negative: '#ff3d6e', Neutral: '#ffc847' };
const layout_base = {
  paper_bgcolor:'transparent', plot_bgcolor:'transparent',
  font:{ family:"'Space Mono', monospace", color:'#c8d8e8', size:11 },
  margin:{ t:10, b:40, l:40, r:10 },
  showlegend:true,
  legend:{ bgcolor:'transparent', font:{ size:10 } }
};

async function loadStats() {
  const d = await fetch('/api/stats').then(r=>r.json());
  document.getElementById('s-total').textContent = d.total;
  document.getElementById('s-avg').textContent   = (d.avg_score >= 0 ? '+' : '') + d.avg_score.toFixed(2);
  document.getElementById('s-pos').textContent   = d.positive;
  document.getElementById('s-neg').textContent   = d.negative;
  document.getElementById('s-neu').textContent   = d.neutral;
}

async function loadDonut() {
  const data = await fetch('/api/sentiment-counts').then(r=>r.json());
  const labels = data.map(d=>d._id), values = data.map(d=>d.count);
  const colors = labels.map(l=>COLORS[l]||'#888');
  Plotly.newPlot('chart-donut', [{
    type:'pie', labels, values,
    marker:{ colors, line:{ color:'#080c10', width:2 } },
    textfont:{ family:"'Space Mono',monospace", size:10 },
    hole:0.55
  }], { ...layout_base, margin:{t:10,b:10,l:10,r:10} }, { displayModeBar:false, responsive:true });
}

async function loadBar() {
  const data = await fetch('/api/source-breakdown').then(r=>r.json());
  const sources = [...new Set(data.map(d=>d._id.source))];
  const sentiments = ['Positive','Negative','Neutral'];
  const traces = sentiments.map(s=>({
    name:s, type:'bar', x:sources,
    y: sources.map(src=>{ const f=data.find(d=>d._id.source===src&&d._id.sentiment===s); return f?f.count:0; }),
    marker:{ color: COLORS[s], opacity:0.85 }
  }));
  Plotly.newPlot('chart-bar', traces, {
    ...layout_base, barmode:'group',
    xaxis:{ gridcolor:'#1e2d40', zerolinecolor:'#1e2d40' },
    yaxis:{ gridcolor:'#1e2d40', zerolinecolor:'#1e2d40', dtick:1 }
  }, { displayModeBar:false, responsive:true });
}

async function loadLine() {
  const data = await fetch('/api/score-over-time').then(r=>r.json());
  const x = data.map(d=>d.timestamp), y = data.map(d=>d.score);
  const colors = y.map(v=> v>0.1?'#00ff9d': v<-0.1?'#ff3d6e':'#ffc847');
  Plotly.newPlot('chart-line', [{
    x, y, type:'scatter', mode:'lines+markers',
    line:{ color:'#00e5ff', width:2 },
    marker:{ color:colors, size:8, line:{color:'#080c10',width:1} }
  }], {
    ...layout_base,
    xaxis:{ gridcolor:'#1e2d40', zerolinecolor:'#1e2d40', showticklabels:true, tickfont:{size:9} },
    yaxis:{ gridcolor:'#1e2d40', zeroline:true, zerolinecolor:'#3a4f62', range:[-1.1,1.1] },
    shapes:[{ type:'line', x0:0, x1:1, xref:'paper', y0:0, y1:0,
              line:{color:'rgba(255,255,255,0.1)', width:1, dash:'dot'} }]
  }, { displayModeBar:false, responsive:true });
}

async function loadFeed() {
  const reviews = await fetch('/api/reviews').then(r=>r.json());
  const feed = document.getElementById('feed');
  feed.innerHTML = '';
  reviews.forEach(r=>{
    const cls = r.sentiment==='Positive'?'pos':r.sentiment==='Negative'?'neg':'neu';
    const scoreStr = (r.score>=0?'+':'')+r.score.toFixed(2);
    const el = document.createElement('div');
    el.className = 'feed-item';
    el.innerHTML = `
      <div class="feed-dot dot-${cls}"></div>
      <div class="feed-text">${r.text}</div>
      <div class="feed-source">[${r.source}]</div>
      <div class="feed-score" style="color:${COLORS[r.sentiment]}">${scoreStr}</div>
    `;
    feed.appendChild(el);
  });
}

async function analyzeText() {
  const text   = document.getElementById('review-input').value.trim();
  const source = document.getElementById('source-select').value;
  if (!text) return;
  const btn = document.getElementById('analyzeBtn');
  btn.textContent = '...'; btn.disabled = true;
  const res = await fetch('/api/analyze', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ text, source })
  }).then(r=>r.json());
  btn.textContent = 'ANALYZE →'; btn.disabled = false;
  const box = document.getElementById('result-box');
  const sent = res.sentiment;
  box.style.display = 'flex';
  box.style.background = sent==='Positive'?'rgba(0,255,157,0.07)':sent==='Negative'?'rgba(255,61,110,0.07)':'rgba(255,200,71,0.07)';
  box.style.borderColor = COLORS[sent];
  document.getElementById('result-sentiment').textContent = sent;
  document.getElementById('result-sentiment').style.color = COLORS[sent];
  document.getElementById('result-score').textContent = `Score: ${res.score>=0?'+':''}${res.score.toFixed(3)}`;
  document.getElementById('review-input').value = '';
  refreshAll();
}

function refreshAll() {
  loadStats(); loadDonut(); loadBar(); loadLine(); loadFeed();
}

refreshAll();
</script>
</body>
</html>
